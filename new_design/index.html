<!doctype html>
<!-- @dsCard group="Brand" name="Alphacon MVP web app" -->
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Alphacon AI — MVP web app</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); font-family: var(--font-sans); overflow: hidden; }
  #root { height: 100vh; width: 100vw; }

  /* Subtle, warm scrollbar */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }

  /* Hide focus ring on buttons unless keyboard nav */
  button:focus:not(:focus-visible) { outline: none; box-shadow: none; }

  /* Selection */
  ::selection { background: var(--graphite); color: #ffffff; }
</style>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<!-- Data (vanilla, runs first) -->
<script src="data.js"></script>

<!-- Components -->
<script type="text/babel" src="components.jsx"></script>

<!-- Screens (one file per tab — see screens/ and 00_READ_FIRST_CLAUDE_CODE.md).
     _SharedDevices defines DeviceList/DeviceDrawer used by both Devices and Property detail. -->
<script type="text/babel" src="screens/_SharedDevices.jsx"></script>
<script type="text/babel" src="screens/Intelligence.jsx"></script>
<script type="text/babel" src="screens/Portfolio.jsx"></script>
<script type="text/babel" src="screens/PropertyDetail.jsx"></script>
<script type="text/babel" src="screens/Devices.jsx"></script>
<script type="text/babel" src="screens/Integrations.jsx"></script>
<script type="text/babel" src="screens/AgenticAutomations.jsx"></script>
<script type="text/babel" src="screens/Settings.jsx"></script>
<script type="text/babel" src="screens/Team.jsx"></script>
<script type="text/babel" src="screens/Agent.jsx"></script>

<!-- Onboarding -->
<script type="text/babel" src="onboarding.jsx"></script>

<!-- App router (last) -->
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
