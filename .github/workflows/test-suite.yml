name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend unit tests ─────────────────────────────────────────────────────

  unit-tests-backend:
    name: Unit tests — unittest (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alphacon
          POSTGRES_PASSWORD: alphacon
          POSTGRES_DB: alphacon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://alphacon:alphacon@localhost:5432/alphacon_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-not-real
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m unittest discover -s . -p "test_*.py" -v

  # ── Frontend unit tests ────────────────────────────────────────────────────

  unit-tests-frontend:
    name: Unit tests — Vitest (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  # ── End-to-end tests ───────────────────────────────────────────────────────
  # Restored in Batch 9 once backend and frontend are complete.
