name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend unit tests ─────────────────────────────────────────────────────

  unit-tests-backend:
    name: Unit tests — unittest (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alphacon
          POSTGRES_PASSWORD: alphacon
          POSTGRES_DB: alphacon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://alphacon:alphacon@localhost:5432/alphacon_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-not-real
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m unittest discover -s . -p "test_*.py" -v

  # ── Frontend unit tests ────────────────────────────────────────────────────

  unit-tests-frontend:
    name: Unit tests — Vitest (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test

  # ── End-to-end tests ───────────────────────────────────────────────────────
  # Runs after both unit test jobs pass. Wired up fully in Batch 9 once
  # backend and frontend are complete — the job structure is defined now.

  e2e-tests-playwright:
    name: E2E tests — Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests-backend, unit-tests-frontend]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alphacon
          POSTGRES_PASSWORD: alphacon
          POSTGRES_DB: alphacon_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://alphacon:alphacon@localhost:5432/alphacon_e2e
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-not-real
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head

      - name: Start backend
        working-directory: backend
        run: uvicorn alphacon.main:app --host 0.0.0.0 --port 8000 &

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend
        working-directory: frontend
        run: npm run start &

      - name: Wait for services to be ready
        run: npx wait-on http://localhost:8000/health http://localhost:3000 --timeout 30000

      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
