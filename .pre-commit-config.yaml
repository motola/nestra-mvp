repos:
  # ── Python lint & format ───────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20  # keep in sync with pyproject [dev] + CI so all three agree
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # ── Secrets detection ──────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ── General hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: [--branch, main]

  # ── Commit message format: NEM-XX: description ────────────────────────────
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        language: system
        entry: python3 .github/scripts/validate_commit_msg.py
        stages: [commit-msg]

  # ── Frontend format (Prettier) ────────────────────────────────────────────
  - repo: local
    hooks:
      - id: prettier-frontend
        name: Prettier (frontend)
        language: system
        entry: bash -c 'cd frontend && npx prettier --write "${@#frontend/}"' --
        files: ^frontend/.*\.(ts|tsx|js|mjs|cjs|json|css)$
        pass_filenames: true

  # ── TypeScript lint (frontend) ─────────────────────────────────────────────
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend)
        language: system
        entry: bash -c 'cd frontend && npm run lint -- --max-warnings 0'
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
